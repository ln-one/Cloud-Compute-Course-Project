services:
  backend:
    build: ./backend
    image: backend:v1
    ports:
      - "5001:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      - redis
  frontend:
    build: ./frontend
    image: frontend:v1
    ports:
      - "8080:80"
    depends_on:
      - backend
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
