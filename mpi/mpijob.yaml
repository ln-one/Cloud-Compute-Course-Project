apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: mpi-integral
  namespace: default
spec:
  launcherCreationPolicy: WaitForWorkersReady
  slotsPerWorker: 2
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          imagePullSecrets:
            - name: default-secret
          containers:
            - name: launcher
              image: swr.cn-north-4.myhuaweicloud.com/cloud-compute-2026/mpi4py:latest
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              command:
                - mpirun
                - --hostfile
                - /etc/mpi/hostfile
                - --map-by
                - slot
                - --mca
                - plm_rsh_args
                - "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectionAttempts=10"
                - -n
                - "4"
                - python
                - /opt/mpi/integral_mpi.py
                - "10000000"
    Worker:
      replicas: 2
      template:
        spec:
          imagePullSecrets:
            - name: default-secret
          containers:
            - name: worker
              image: swr.cn-north-4.myhuaweicloud.com/cloud-compute-2026/mpi4py:latest
              env:
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
